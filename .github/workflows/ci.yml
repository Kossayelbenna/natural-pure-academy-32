name: CI — Build & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint . --ext .ts,.tsx --max-warnings 50

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          BUNDLE_SIZE=$(du -sk dist/assets/*.js | awk '{sum += $1} END {print sum}')
          echo "Total JS bundle: ${BUNDLE_SIZE}KB"
          if [ "$BUNDLE_SIZE" -gt 600 ]; then
            echo "⚠️  Warning: bundle exceeds 600KB — consider more code splitting"
          else
            echo "✅ Bundle size OK"
          fi

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true
